<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S & J Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#1f3328,#0c1410 70%);
color:white;
overflow-x:hidden;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#1f3328,#0c1410 70%);
z-index:9999;
transition:1s;
}

.loader-logo{
font-family:'Cinzel',serif;
font-size:65px;
letter-spacing:10px;
}

.loader-ring{
width:80px;
height:80px;
border-radius:50%;
border:3px solid rgba(255,255,255,.1);
border-top:3px solid #f5e6a8;
margin-top:20px;
animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* MAIN */
.container{
display:none;
text-align:center;
padding:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,.06);
padding:30px;
border-radius:25px;
max-width:420px;
margin:40px auto;
border:1px solid rgba(255,255,255,.08);
}

.logo{
font-family:'Cinzel',serif;
font-size:55px;
}

.names{
font-family:'Great Vibes',cursive;
font-size:65px;
margin:20px 0;
}

.gold{
background:linear-gradient(45deg,#caa64b,#f5e6a8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#caa64b,#f5e6a8);
font-weight:600;
cursor:pointer;
}

/* MUSIC */
.music-btn{
position:fixed;
top:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
background:rgba(255,255,255,.1);
border:none;
color:white;
cursor:pointer;
z-index:100;
}

/* PETALS */
.petal{
position:fixed;
top:-10px;
width:6px;
height:6px;
background:pink;
border-radius:50%;
animation:fall linear;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* EXPORT AREA */
#exportArea{
position:fixed;
left:-9999px;
top:0;
width:420px;
background:#0c1410;
padding:30px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div style="text-align:center;">
<div class="loader-logo gold">S & J</div>
<div class="loader-ring"></div>
</div>
</div>

<!-- MUSIC -->
<button class="music-btn" onclick="toggleMusic()">🔊</button>

<!-- MAIN -->
<div class="container" id="main">

<button class="btn" id="openBtn">✨ Open Invitation</button>

<div class="card" id="card">

<div class="logo gold">S & J</div>

<div class="names gold">
Shaima Sheri <br> ❤ <br> Junaid
</div>

<p>June 7, 2026 • 12:00 PM</p>

<p onclick="openMap()" style="cursor:pointer;">
Triangle Convention Center
</p>

<button class="btn" onclick="openMap()">View Location</button>
<button class="btn" onclick="addCalendar()">Add to Calendar</button>

<h3>Will you join us?</h3>

<button class="btn" onclick="sendRSVP('Yes')">Yes</button>
<button class="btn" style="background:#888;color:white;" onclick="sendRSVP('No')">No</button>

<button class="btn" onclick="downloadAutoCard()">
📸 Download Invitation
</button>

</div>

<div id="yesPage" class="card" style="display:none">
<h2 class="gold">We Can't Wait!</h2>
<button class="btn" onclick="goBack()">Back</button>
</div>

<div id="noPage" class="card" style="display:none">
<h2 class="gold">We'll Miss You</h2>
<button class="btn" onclick="goBack()">Back</button>
</div>

</div>

<!-- EXPORT AREA -->
<div id="exportArea"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let card, yesPage, noPage, music, playing=false;

/* INIT */
window.onload=()=>{
card=document.getElementById("card");
yesPage=document.getElementById("yesPage");
noPage=document.getElementById("noPage");
music=document.getElementById("music");

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
},3500);
};

/* MUSIC */
document.getElementById("openBtn").onclick=async()=>{
await music.play();
playing=true;
document.getElementById("openBtn").remove();
};

function toggleMusic(){
if(playing)music.pause();
else music.play();
playing=!playing;
}

/* MAP */
function openMap(){
window.open("https://maps.app.goo.gl/nJRiQzDbnz9yDSkZA");
}

/* CALENDAR */
function addCalendar(){
window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text=Wedding&dates=20260607T120000/20260607T150000");
}

/* RSVP */
function sendRSVP(r){
card.style.display="none";
if(r==="Yes")yesPage.style.display="block";
else noPage.style.display="block";
}

/* BACK */
function goBack(){
card.style.display="block";
yesPage.style.display="none";
noPage.style.display="none";
}

/* 🌟 FIXED DOWNLOAD SYSTEM (GITHUB SAFE) */
function downloadAutoCard(){

const original=document.getElementById("card");
const exportArea=document.getElementById("exportArea");

/* clone clean version */
const clone=original.cloneNode(true);

/* remove problematic styles */
clone.style.backdropFilter="none";
clone.style.boxShadow="none";
clone.style.transform="none";

/* move to export area */
exportArea.innerHTML="";
exportArea.appendChild(clone);

/* render */
html2canvas(clone,{
scale:4,
useCORS:true,
allowTaint:true,
backgroundColor:"#0c1410"
}).then(canvas=>{

const link=document.createElement("a");
link.download="Shaima_Junaid_Nikkah_Invitation.png";
link.href=canvas.toDataURL("image/png");
link.click();

/* cleanup */
exportArea.innerHTML="";

});

}

</script>

</body>
</html>
